<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" role="img" aria-label="How never-stale works, start to finish: enable the plugin, write your rules in CLAUDE.md, work for a while, an auto-compact happens, never-stale re-injects your rules, and you keep working with nothing forgotten.">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <style>
    .ttl{fill:#8b949e;font-size:12px;}
    .h{fill:#c9d1d9;font-size:14px;font-weight:700;} .sub{fill:#8b949e;font-size:12px;}
    .acc{fill:#e0936f;font-size:14px;font-weight:700;} .grn{fill:#7ee787;font-size:14px;font-weight:700;}
    .amb{fill:#e3b341;font-size:14px;font-weight:700;} .dim{fill:#6e7681;font-size:12px;}
  </style>

  <!-- window chrome -->
  <rect x="1" y="1" width="758" height="538" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <path d="M1 11 a10 10 0 0 1 10 -10 h738 a10 10 0 0 1 10 10 v25 h-758 z" fill="#161b22"/>
  <circle cx="22" cy="18.5" r="6" fill="#ff5f56"/><circle cx="42" cy="18.5" r="6" fill="#ffbd2e"/><circle cx="62" cy="18.5" r="6" fill="#27c93f"/>
  <text x="380" y="23" text-anchor="middle" class="ttl">how never-stale keeps your rules — start to finish</text>
  <line x1="1" y1="37" x2="759" y2="37" stroke="#30363d" stroke-width="1"/>

  <!-- 1 · enable -->
  <rect x="110" y="56" width="540" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="380" y="80" text-anchor="middle" class="h">1 · Enable the plugin</text>
  <text x="380" y="99" text-anchor="middle" class="sub">once — hooks register machine-wide, silent until you opt a project in</text>
  <line x1="380" y1="108" x2="380" y2="126" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 2 · define rules -->
  <rect x="110" y="128" width="540" height="70" rx="10" fill="#161b22" stroke="#d97757" stroke-width="2"/>
  <text x="380" y="153" text-anchor="middle" class="acc">2 · Write your rules in CLAUDE.md</text>
  <text x="380" y="178" text-anchor="middle" class="sub">e.g.  reply in 繁體中文   ·   sync docs after edits   ·   no new deps</text>
  <line x1="380" y1="198" x2="380" y2="220" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- time passage -->
  <line x1="250" y1="234" x2="510" y2="234" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="380" y="231" text-anchor="middle" class="dim">⋯ a few hours of real work later ⋯</text>
  <line x1="380" y1="244" x2="380" y2="262" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 3 · auto-compact -->
  <rect x="110" y="264" width="540" height="56" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="2"/>
  <text x="380" y="289" text-anchor="middle" class="amb">3 · Auto-compact happens</text>
  <text x="380" y="308" text-anchor="middle" class="sub">the conversation is summarized — your rules would normally be lost here</text>
  <line x1="380" y1="320" x2="380" y2="338" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 4 · re-inject -->
  <rect x="110" y="340" width="540" height="62" rx="10" fill="#161b22" stroke="#d97757" stroke-width="2"/>
  <text x="380" y="365" text-anchor="middle" class="acc">4 · never-stale re-injects your rules</text>
  <text x="380" y="389" text-anchor="middle" class="sub">the [never-stale] reminder fires at exactly that moment</text>
  <line x1="380" y1="402" x2="380" y2="420" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 5 · continue -->
  <rect x="110" y="422" width="540" height="62" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="380" y="447" text-anchor="middle" class="grn">5 · You keep working — nothing forgotten</text>
  <text x="380" y="471" text-anchor="middle" class="sub">still your language, still syncing docs, still your conventions</text>

  <!-- footer -->
  <line x1="24" y1="504" x2="736" y2="504" stroke="#21262d" stroke-width="1"/>
  <text x="380" y="527" text-anchor="middle" fill="#484f58" font-size="12">opt in once · the reminders fire only in your opted-in projects</text>
</svg>
