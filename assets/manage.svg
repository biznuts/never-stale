<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" width="760" height="330" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" role="img" aria-label="Managing never-stale in a project: off pauses (reversible) and on resumes; remove tears the project setup down after a plan and confirm, with --dry-run to preview; list finds every opted-in or legacy project on disk.">
  <style>
    .cmd{fill:#e0936f;font-size:13px;font-weight:700;} .cm{fill:#6e7681;font-size:13px;}
    .grp{fill:#8b949e;font-size:12px;font-weight:700;letter-spacing:.5px;}
    .ttl{fill:#8b949e;font-size:12px;}
  </style>

  <!-- window chrome -->
  <rect x="1" y="1" width="758" height="328" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <path d="M1 11 a10 10 0 0 1 10 -10 h738 a10 10 0 0 1 10 10 v25 h-758 z" fill="#161b22"/>
  <circle cx="22" cy="18.5" r="6" fill="#ff5f56"/><circle cx="42" cy="18.5" r="6" fill="#ffbd2e"/><circle cx="62" cy="18.5" r="6" fill="#27c93f"/>
  <text x="380" y="23" text-anchor="middle" class="ttl">managing never-stale in a project</text>
  <line x1="1" y1="37" x2="759" y2="37" stroke="#30363d" stroke-width="1"/>

  <!-- PAUSE -->
  <rect x="28" y="56" width="9" height="9" rx="2" fill="#ffbd2e"/>
  <text x="44" y="65" class="grp">PAUSE · reversible</text>
  <text x="28"  y="90"  class="cmd">/never-stale:off</text>
  <text x="300" y="90"  class="cm"># pause · gate goes silent, nothing deleted</text>
  <text x="28"  y="114" class="cmd">/never-stale:on</text>
  <text x="300" y="114" class="cm"># resume · same languages, gate fires again</text>

  <!-- REMOVE -->
  <rect x="28" y="142" width="9" height="9" rx="2" fill="#f85149"/>
  <text x="44" y="151" class="grp">REMOVE · teardown</text>
  <text x="28"  y="176" class="cmd">/never-stale:remove</text>
  <text x="300" y="176" class="cm"># plan → confirm → delete this project's setup</text>
  <text x="28"  y="200" class="cmd">/never-stale:remove --dry-run</text>
  <text x="300" y="200" class="cm"># preview only · removes nothing</text>

  <!-- FIND -->
  <rect x="28" y="228" width="9" height="9" rx="2" fill="#58a6ff"/>
  <text x="44" y="237" class="grp">FIND</text>
  <text x="28"  y="262" class="cmd">/never-stale:list</text>
  <text x="300" y="262" class="cm"># every opted-in / legacy project on disk</text>

  <!-- footer -->
  <line x1="24" y1="286" x2="736" y2="286" stroke="#21262d" stroke-width="1"/>
  <text x="380" y="310" text-anchor="middle" fill="#484f58" font-size="12">all per-project · the plugin stays installed machine-wide (/plugin uninstall removes it everywhere)</text>
</svg>
