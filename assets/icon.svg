<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="never-stale icon: a refresh ring around the project rules, keeping them fresh after every auto-compact">
  <!-- tile -->
  <rect x="6" y="6" width="500" height="500" rx="112" fill="#0d1117" stroke="#30363d" stroke-width="6"/>

  <!-- refresh ring (gap at top, arrowhead sweeping up into the gap) -->
  <path d="M 307.3 115 A 150 150 0 1 1 204.7 115" fill="none" stroke="#d97757" stroke-width="34" stroke-linecap="round"/>
  <!-- arrowhead at the upper-left terminus, pointing up-right into the gap -->
  <path d="M 232.9 104.8 L 206.6 137.7 L 191.6 96.3 Z" fill="#d97757"/>

  <!-- the rules being kept fresh (top line = the language rule, accented) -->
  <rect x="196" y="218" width="120" height="16" rx="8" fill="#e0936f"/>
  <rect x="196" y="248" width="96"  height="16" rx="8" fill="#8b949e"/>
  <rect x="196" y="278" width="72"  height="16" rx="8" fill="#6e7681"/>
</svg>
