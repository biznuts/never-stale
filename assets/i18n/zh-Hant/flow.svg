<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', 'Noto Sans CJK TC', monospace" role="img" aria-label="never-stale 由頭到尾如何運作：1 啟用外掛；2 在 CLAUDE.md 寫下你的規則；幾小時工作之後；3 自動壓縮發生、你的規則本來會丟失；4 never-stale 重新注入你的規則；5 你繼續工作，什麼都沒忘。">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <style>
    .ttl{fill:#8b949e;font-size:12px;}
    .h{fill:#c9d1d9;font-size:14px;font-weight:700;} .sub{fill:#8b949e;font-size:12px;}
    .acc{fill:#e0936f;font-size:14px;font-weight:700;} .grn{fill:#7ee787;font-size:14px;font-weight:700;}
    .amb{fill:#e3b341;font-size:14px;font-weight:700;} .dim{fill:#6e7681;font-size:12px;}
  </style>

  <!-- window chrome -->
  <rect x="1" y="1" width="758" height="538" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <path d="M1 11 a10 10 0 0 1 10 -10 h738 a10 10 0 0 1 10 10 v25 h-758 z" fill="#161b22"/>
  <circle cx="22" cy="18.5" r="6" fill="#ff5f56"/><circle cx="42" cy="18.5" r="6" fill="#ffbd2e"/><circle cx="62" cy="18.5" r="6" fill="#27c93f"/>
  <text x="380" y="23" text-anchor="middle" class="ttl">never-stale 如何留住你的規則 —— 由頭到尾</text>
  <line x1="1" y1="37" x2="759" y2="37" stroke="#30363d" stroke-width="1"/>

  <!-- 1 · enable -->
  <rect x="110" y="56" width="540" height="52" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="380" y="80" text-anchor="middle" class="h">1 · 啟用外掛</text>
  <text x="380" y="99" text-anchor="middle" class="sub">一次 —— hooks 整台機器註冊，未加入專案前一直靜默</text>
  <line x1="380" y1="108" x2="380" y2="126" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 2 · define rules -->
  <rect x="110" y="128" width="540" height="70" rx="10" fill="#161b22" stroke="#d97757" stroke-width="2"/>
  <text x="380" y="153" text-anchor="middle" class="acc">2 · 在 CLAUDE.md 寫下你的規則</text>
  <text x="380" y="178" text-anchor="middle" class="sub">例如  用繁體中文回覆   ·   改完同步文件   ·   不加新相依套件</text>
  <line x1="380" y1="198" x2="380" y2="220" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- time passage -->
  <line x1="250" y1="234" x2="510" y2="234" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="380" y="231" text-anchor="middle" class="dim">⋯ 幾小時的實際工作之後 ⋯</text>
  <line x1="380" y1="244" x2="380" y2="262" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 3 · auto-compact -->
  <rect x="110" y="264" width="540" height="56" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="2"/>
  <text x="380" y="289" text-anchor="middle" class="amb">3 · 自動壓縮發生</text>
  <text x="380" y="308" text-anchor="middle" class="sub">對話被摘要 —— 你的規則通常會在這裡丟失</text>
  <line x1="380" y1="320" x2="380" y2="338" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 4 · re-inject -->
  <rect x="110" y="340" width="540" height="62" rx="10" fill="#161b22" stroke="#d97757" stroke-width="2"/>
  <text x="380" y="365" text-anchor="middle" class="acc">4 · never-stale 重新注入你的規則</text>
  <text x="380" y="389" text-anchor="middle" class="sub">[never-stale] 提示正正在那一刻觸發</text>
  <line x1="380" y1="402" x2="380" y2="420" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- 5 · continue -->
  <rect x="110" y="422" width="540" height="62" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="380" y="447" text-anchor="middle" class="grn">5 · 你繼續工作 —— 什麼都沒忘</text>
  <text x="380" y="471" text-anchor="middle" class="sub">仍是你的語言、仍在同步文件、仍是你的慣例</text>

  <!-- footer -->
  <line x1="24" y1="504" x2="736" y2="504" stroke="#21262d" stroke-width="1"/>
  <text x="380" y="527" text-anchor="middle" fill="#484f58" font-size="12">加入一次 · 提示只在你已加入的專案觸發</text>
</svg>
