<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', 'Noto Sans CJK JP', monospace" role="img" aria-label="never-stale 動詞サブコマンドの状態機械：setup でプロジェクトを有効化（ゲート発火）；off で一時停止・on で再開（停止中は静か）；remove でマーカーなしへ撤去；update は記録の整合のみ；status と list は読み取り専用。">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <style>
    .t{fill:#c9d1d9;font-size:13px;} .dim{fill:#6e7681;font-size:13px;}
    .ok{fill:#3fb950;font-size:13px;} .acc{fill:#e0936f;font-size:13px;font-weight:700;}
    .ttl{fill:#8b949e;font-size:12px;} .h{fill:#c9d1d9;font-size:14px;font-weight:700;}
    .grn{fill:#7ee787;font-size:14px;font-weight:700;}
  </style>

  <!-- window chrome -->
  <rect x="1" y="1" width="758" height="428" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <path d="M1 11 a10 10 0 0 1 10 -10 h738 a10 10 0 0 1 10 10 v25 h-758 z" fill="#161b22"/>
  <circle cx="22" cy="18.5" r="6" fill="#ff5f56"/><circle cx="42" cy="18.5" r="6" fill="#ffbd2e"/><circle cx="62" cy="18.5" r="6" fill="#27c93f"/>
  <text x="380" y="23" text-anchor="middle" class="ttl">動詞サブコマンド · 各々がプロジェクトをどう動かすか</text>
  <line x1="1" y1="37" x2="759" y2="37" stroke="#30363d" stroke-width="1"/>

  <!-- update self-loop (above ENABLED) -->
  <text x="385" y="78" text-anchor="middle" class="acc">update<tspan class="dim" font-weight="400" dx="6">· 記録を整合、その場に留まる</tspan></text>
  <path d="M348 128 C348 92 422 92 422 128" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- state boxes -->
  <rect x="40"  y="128" width="180" height="72" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="162" text-anchor="middle" class="h">未有効化</text>
  <text x="130" y="184" text-anchor="middle" class="dim">マーカーなし · 静か</text>

  <rect x="300" y="128" width="170" height="72" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="385" y="162" text-anchor="middle" class="grn">有効</text>
  <text x="385" y="184" text-anchor="middle" class="ok">✓ ゲート発火</text>

  <rect x="540" y="128" width="180" height="72" rx="10" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="630" y="162" text-anchor="middle" class="h">停止中</text>
  <text x="630" y="184" text-anchor="middle" class="dim">無効 · 静か</text>

  <!-- setup: not-opted-in -> ENABLED -->
  <text x="260" y="151" text-anchor="middle" class="acc">setup</text>
  <line x1="222" y1="164" x2="296" y2="164" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- off (top) and on (bottom): ENABLED <-> PAUSED -->
  <text x="505" y="143" text-anchor="middle" class="acc">off</text>
  <line x1="472" y1="152" x2="536" y2="152" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>
  <text x="505" y="197" text-anchor="middle" class="acc">on</text>
  <line x1="538" y1="178" x2="474" y2="178" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- remove: ENABLED & PAUSED -> not opted in (bottom rail) -->
  <text x="372" y="296" text-anchor="middle" class="acc">remove<tspan class="dim" font-weight="400" dx="6">· 完全撤去</tspan></text>
  <path d="M385 200 V312" fill="none" stroke="#8b949e" stroke-width="2"/>
  <path d="M630 200 V312 H130 V204" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- read-only verbs -->
  <line x1="24" y1="346" x2="736" y2="346" stroke="#21262d" stroke-width="1"/>
  <text x="380" y="372" text-anchor="middle" class="t"><tspan class="acc">status</tspan><tspan class="dim" dx="4">·</tspan><tspan class="acc" dx="4">list</tspan><tspan class="dim" dx="8">— 読み取り専用：状態を見るだけ、変更しない</tspan></text>

  <!-- footer -->
  <text x="380" y="410" text-anchor="middle" fill="#484f58" font-size="12">setup ▸ off ⇄ on ▸ remove   ·   update = 記録整理   ·   status / list = 読み取り専用</text>
</svg>
