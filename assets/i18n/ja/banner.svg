<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', 'Noto Sans CJK JP', monospace" role="img" aria-label="never-stale —— 一度決めれば、もう逸れない。プロジェクトのルールを毎回の自動圧縮を越えて Claude の目の前に保つ Claude Code プラグイン。">
